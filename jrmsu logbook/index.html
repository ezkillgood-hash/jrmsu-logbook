<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JRMSU-SC LogBook</title>

<!-- ✅ Theme color for splash/top bar -->
<meta name="theme-color" content="#0f2c8c">

<!-- ✅ App icons (these files must exist in same folder) -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- ✅ INLINE MANIFEST (no manifest.json needed) -->
<script>
(function () {
  const manifest = {
    name: "JRMSU-SC LogBook",
    short_name: "LogBook",
    description: "Campus Director LogBook System",
    start_url: "./index.html",
    scope: "./",
    display: "standalone",
    background_color: "#0f2c8c",
    theme_color: "#0f2c8c",
    orientation: "portrait",
    icons: [
      { src: "./icon-192.png", sizes: "192x192", type: "image/png" },
      { src: "./icon-512.png", sizes: "512x512", type: "image/png" }
    ]
  };

  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
  const manifestURL = URL.createObjectURL(manifestBlob);

  const link = document.createElement("link");
  link.rel = "manifest";
  link.href = manifestURL;
  document.head.appendChild(link);
})();
</script>

<!-- ✅ XLSX LOCAL (must exist in same folder) -->
<script src="xlsx.full.min.js"></script>

<style>
body {font-family: Arial, sans-serif; margin:0; background:#f4f6f9;}

/* ===== HEADER ===== */
header {background:#0f2c8c; color:white; padding:20px; text-align:center; border-bottom:6px solid #ffd700;}
header h2 {margin:5px 0; letter-spacing:1px;}

/* ===== CONTAINER ===== */
.container {padding:20px; max-width:1200px; margin:auto;}

/* ===== CARD DESIGN ===== */
.card {background:white; padding:15px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:20px; border-top:5px solid #0f2c8c;}

/* ===== FORM ===== */
form {display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;}

input, select {padding:8px; font-size:14px; border:1px solid #ccc; border-radius:6px;}
input:focus, select:focus {outline:none; border:1px solid #0f2c8c; box-shadow:0 0 5px rgba(15,44,140,0.4);}

/* ===== BUTTONS ===== */
button {cursor:pointer; border:none; border-radius:6px; padding:8px; font-weight:bold;}
.btn-primary {background:#0f2c8c; color:white;}
.btn-primary:hover {background:#081d63;}
.btn-success {background:#ffd700; color:#0f2c8c;}
.btn-success:hover {background:#e6c200;}
.btn-danger {background:#dc2626; color:white;}

/* ===== TABLE ===== */
table {width:100%; border-collapse:collapse; margin-top:10px;}
th, td {border:1px solid #ddd; padding:8px; text-align:center;}
th {background:#0f2c8c; color:#ffd700;}
tbody tr:nth-child(even) {background:#f9f9f9;}
tbody tr:hover {background:#fff8cc;}

/* ✅ Default: show dropdown on screen, hide print text */
.print-only { display:none; }
.screen-only { display:inline; }

/* ===== PRINT ===== */
@media print {
  body * { visibility:hidden; }
  #printSection, #printSection * { visibility:visible; }
  #printSection { position:absolute; left:0; top:0; width:100%; }

  /* ✅ Hide Action column */
  #logTable th:last-child,
  #logTable td:last-child { display:none !important; }

  /* ✅ Hide buttons */
  #printSection button { display:none !important; }

  /* ✅ Print: show text only, hide dropdowns */
  .screen-only { display:none !important; }
  .print-only { display:inline !important; }
  #logTable select { display:none !important; }

  /* ✅ Show print footer */
  #printFooter { display:block !important; }
}
</style>
</head>

<body>
<header>
  <img src="345.png" alt="University Logo" style="width:120px; display:block; margin:0 auto 10px;">
  <h2>Campus Director LogBook</h2>
</header>

<div class="container">

  <div class="card" id="loginCard">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-primary" onclick="login()">Login</button>
    <p><small>Demo: admin / 1234</small></p>
  </div>

  <div id="mainSystem" style="display:none;">

    <div class="card">
      <h3>Add Log Entry</h3>

      <form id="logForm">
        <input type="date" id="date" required>
        <input type="time" id="timeIn" required>
        <input type="time" id="timeOut" required>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="department" placeholder="Department" required>

        <select id="remarks" required>
          <option value="">Select Activity / Remarks</option>
          <option value="Approval of Varied Documents/Requests">Approval of Varied Documents/Requests</option>
          <option value="Inquire">Inquire</option>
          <option value="Request/Submit documents/materials">Request/Submit documents/materials</option>
          <option value="Seek assistance">Seek assistance</option>
          <option value="Signing of Employee Clearance">Signing of Employee Clearance</option>
        </select>

        <select id="status" required>
          <option value="">Status</option>
          <option value="Completed">Completed</option>
          <option value="Pending">Pending</option>
        </select>

        <button type="submit" class="btn-success">Add</button>
      </form>
    </div>

    <div class="card" id="printSection">
      <h3>Logbook Records</h3>
      <button class="btn-primary" onclick="exportToExcel()">Export Excel</button>
      <button class="btn-primary" onclick="printLogbook()">Print</button>

      <table id="logTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Total Hours</th>
            <th>Name</th>
            <th>Department</th>
            <th>Activity / Remarks</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div id="printFooter" style="margin-top:40px; display:none;">
        <p><strong>Date Printed:</strong> <span id="printDate"></span></p>

        <div style="margin-top:60px; display:flex; justify-content:space-between;">
          <div style="text-align:center; width:45%;">
            ___________________________<br>
            <strong>Prepared by</strong>
          </div>

          <div style="text-align:center; width:45%;">
            ___________________________<br>
            <strong>Noted by</strong>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ===== LOGIN SYSTEM =====
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (user === 'admin' && pass === '1234') {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('mainSystem').style.display = 'block';
  } else {
    alert('Invalid Login');
  }
}

// ===== DATABASE (SIMULATED CLOUD USING LOCALSTORAGE) =====
let logs = JSON.parse(localStorage.getItem('logs')) || [];
const tableBody = document.querySelector('#logTable tbody');

function saveToCloud() {
  localStorage.setItem('logs', JSON.stringify(logs));
}

function loadLogs() {
  tableBody.innerHTML = '';
  logs.forEach((log, index) => addRow(log, index));
}

// ===== TIME COMPUTATION =====
function calculateHours(timeIn, timeOut) {
  const start = new Date(`1970-01-01T${timeIn}`);
  const end = new Date(`1970-01-01T${timeOut}`);
  const diff = (end - start) / (1000 * 60 * 60);
  return diff.toFixed(2);
}

// ===== ADD ENTRY =====
document.getElementById('logForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const log = {
    date: date.value,
    timeIn: timeIn.value,
    timeOut: timeOut.value,
    total: calculateHours(timeIn.value, timeOut.value),
    name: name.value,
    department: department.value,
    remarks: remarks.value,
    status: status.value
  };

  logs.push(log);
  saveToCloud();
  loadLogs();
  this.reset();
});

// ✅ Editable on screen; plain text on print
function addRow(log, index) {
  const row = tableBody.insertRow();

  row.innerHTML = `
    <td>${log.date}</td>
    <td>${log.timeIn}</td>
    <td>${log.timeOut}</td>
    <td>${log.total}</td>
    <td>${log.name}</td>
    <td>${log.department}</td>

    <td>
      <select class="screen-only" onchange="updateRemarks(${index}, this.value)">
        <option value="Approval of Varied Documents/Requests" ${log.remarks==="Approval of Varied Documents/Requests"?"selected":""}>Approval of Varied Documents/Requests</option>
        <option value="Inquire" ${log.remarks==="Inquire"?"selected":""}>Inquire</option>
        <option value="Request/Submit documents/materials" ${log.remarks==="Request/Submit documents/materials"?"selected":""}>Request/Submit documents/materials</option>
        <option value="Seek assistance" ${log.remarks==="Seek assistance"?"selected":""}>Seek assistance</option>
        <option value="Signing of Employee Clearance" ${log.remarks==="Signing of Employee Clearance"?"selected":""}>Signing of Employee Clearance</option>
      </select>
      <span class="print-only">${log.remarks || ""}</span>
    </td>

    <td>
      <select class="screen-only" onchange="updateStatus(${index}, this.value)">
        <option value="Completed" ${log.status==="Completed"?"selected":""}>Completed</option>
        <option value="Pending" ${log.status==="Pending"?"selected":""}>Pending</option>
      </select>
      <span class="print-only">${log.status || ""}</span>
    </td>

    <td>
      <button class="btn-danger" onclick="deleteLog(${index})">Delete</button>
    </td>
  `;
}

// ✅ Save changes immediately
function updateRemarks(index, value) {
  logs[index].remarks = value;
  saveToCloud();
  loadLogs();
}
function updateStatus(index, value) {
  logs[index].status = value;
  saveToCloud();
  loadLogs();
}

// ✅ Delete function
function deleteLog(index) {
  if (confirm("Are you sure you want to delete this entry?")) {
    logs.splice(index, 1);
    saveToCloud();
    loadLogs();
  }
}

// ===== EXPORT =====
function exportToExcel() {
  const table = document.getElementById('logTable');
  const workbook = XLSX.utils.table_to_book(table, {sheet:"Logbook"});
  XLSX.writeFile(workbook, 'Logbook.xlsx');
}

// ===== PRINT =====
function printLogbook() {
  const today = new Date();
  document.getElementById("printDate").innerText = today.toLocaleString();
  window.print();
}

loadLogs();

// ✅ SERVICE WORKER REGISTER (needs separate file: service-worker.js)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .catch(err => console.log("SW failed:", err));
  });
}
</script>

</body>
</html>
